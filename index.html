            background-color: #c0c0c0;
            color: #000000;
            font-family: "Times New Roman", Times, serif;

        .marquee-container {
            background-color: #000080;

            margin: 10px 0;

            font-weight: bold;
            font-style: italic;
        }
        .counter-box {
            text-align: center;
            margin: 15px 0;
        }
        .counter {
            font-family: 'Courier New', Courier, monospace;
            background: #000;
            color: #0f0;
            padding: 5px 15px;
            border: 3px inset #888;
            display: inline-block;
            font-size: 14pt;
        }
        .main-content {
            border: 3px inset #fff;
            background: #ffffff;
            padding: 20px;
            min-height: 850px;
            margin-left: 170px;
        }
        h2 {
            color: #000080;
            border-bottom: 3px ridge #ff0000;
            padding-bottom: 5px;
        }
        .gallery {
            text-align: center;
        }
        .image-card {
            display: inline-block;
            border: 3px outset #808080;
            padding: 10px;
            background: #e0e0e0;
            text-align: center;
            width: 180px;
            margin: 15px;
            vertical-align: top;
        }
        .image-card img {
            width: 150px;
            height: 150px;
            border: 3px inset #fff;
            background-color: #ccc;
            display: block;
            margin: 0 auto;
        }
        .image-name {
            margin-top: 10px;
            font-weight: bold;
            background: #fff;
            border: 1px solid #000;
            padding: 4px;
            font-family: Arial, sans-serif;
            font-size: 10pt;
        }
        .construction {
            text-align: center;
            margin-top: 40px;
        }
        .footer {
            clear: both;
            text-align: center;
            font-size: 9pt;
            margin-top: 30px;
            border-top: 2px solid #808080;
            padding-top: 10px;
        }

</head>
